<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 265" width="420" height="265">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" style="stop-color:rgba(186,230,253,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(2,132,199,0)"/>
    </radialGradient>
  </defs>
  <rect width="420" height="265" rx="18" fill="url(#bg)"/>
  <rect width="420" height="265" rx="18" fill="url(#glow)"/>
  <rect width="420" height="265" rx="18" fill="url(#shine)"/>
  <!-- Hexagon pattern -->
  <polygon points="370,20 395,35 395,65 370,80 345,65 345,35" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <polygon points="370,35 387,45 387,62 370,72 353,62 353,45" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Chip -->
  <rect x="36" y="90" width="54" height="42" rx="6" fill="rgba(255,220,100,0.9)"/>
  <line x1="36" y1="104" x2="90" y2="104" stroke="rgba(200,160,60,0.7)" stroke-width="1"/>
  <line x1="36" y1="118" x2="90" y2="118" stroke="rgba(200,160,60,0.7)" stroke-width="1"/>
  <line x1="60" y1="90" x2="60" y2="132" stroke="rgba(200,160,60,0.7)" stroke-width="1"/>
  <text x="36" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="white" opacity="0.95">Bitget Wallet</text>
  <text x="36" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.7)">Card</text>
  <text x="36" y="185" font-family="monospace" font-size="17" fill="rgba(255,255,255,0.7)" letter-spacing="3">•••• •••• •••• ••••</text>
  <text x="36" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="2">NON-CUSTODIAL</text>
  <!-- Mastercard circles -->
  <circle cx="372" cy="228" r="16" fill="rgba(235,64,52,0.85)"/>
  <circle cx="390" cy="228" r="16" fill="rgba(255,163,0,0.85)"/>
