<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 265" width="420" height="265">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:rgba(167,139,250,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>
  <rect width="420" height="265" rx="18" fill="url(#bg)"/>
  <rect width="420" height="265" rx="18" fill="url(#glow)"/>
  <rect width="420" height="265" rx="18" fill="url(#shine)"/>
  <!-- Circuit pattern -->
  <circle cx="340" cy="60" r="80" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="340" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Chip -->
  <rect x="36" y="90" width="54" height="42" rx="6" fill="rgba(255,220,100,0.9)"/>
  <line x1="36" y1="104" x2="90" y2="104" stroke="rgba(200,160,60,0.7)" stroke-width="1"/>
  <line x1="36" y1="118" x2="90" y2="118" stroke="rgba(200,160,60,0.7)" stroke-width="1"/>
  <line x1="60" y1="90" x2="60" y2="132" stroke="rgba(200,160,60,0.7)" stroke-width="1"/>
  <!-- Logo mark -->
  <text x="36" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.95">✦ Tria</text>
  <!-- Card number -->
  <text x="36" y="185" font-family="monospace" font-size="17" fill="rgba(255,255,255,0.7)" letter-spacing="3">•••• •••• •••• ••••</text>
  <!-- Label -->
  <text x="36" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="2">SELF-CUSTODIAL</text>
  <!-- Visa mark -->
  <text x="356" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" font-style="italic" fill="white" opacity="0.9">VISA</text>
</svg>
