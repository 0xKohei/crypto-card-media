<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 265" width="420" height="265">
  <defs>
    <linearGradient id="tria-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="tria-geo1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="tria-geo2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="tria-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="tria-blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="tria-clip">
      <rect width="420" height="265" rx="18"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <rect width="420" height="265" rx="18" fill="url(#tria-bg)"/>

  <!-- Clipped decorative layers -->
  <g clip-path="url(#tria-clip)">
    <!-- Glow blobs -->
    <ellipse cx="320" cy="40" rx="140" ry="100" fill="#3b82f6" opacity="0.08" filter="url(#tria-blur)"/>
    <ellipse cx="80" cy="220" rx="120" ry="90" fill="#7c3aed" opacity="0.10" filter="url(#tria-blur)"/>

    <!-- Angular geometric shapes (Tria-brand inspired) -->
    <polygon points="200,265 340,80 420,140 420,265" fill="url(#tria-geo1)" opacity="0.55"/>
    <polygon points="260,265 380,100 420,160 420,265" fill="url(#tria-geo2)" opacity="0.35"/>
    <polygon points="310,0 420,0 420,130 350,60" fill="#4f46e5" opacity="0.18"/>

    <!-- Fine grid lines -->
    <line x1="0" y1="132" x2="420" y2="132" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="66" x2="420" y2="66" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="198" x2="420" y2="198" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <!-- Shine overlay -->
    <rect width="420" height="265" rx="18" fill="url(#tria-shine)"/>
  </g>

  <!-- Chip -->
  <rect x="36" y="100" width="50" height="38" rx="5" fill="#d4a847"/>
  <rect x="36" y="100" width="50" height="38" rx="5" fill="none" stroke="#b8922f" stroke-width="0.8"/>
  <line x1="36" y1="113" x2="86" y2="113" stroke="#b8922f" stroke-width="0.7"/>
  <line x1="36" y1="125" x2="86" y2="125" stroke="#b8922f" stroke-width="0.7"/>
  <line x1="55" y1="100" x2="55" y2="138" stroke="#b8922f" stroke-width="0.7"/>
  <rect x="43" y="106" width="16" height="10" rx="2" fill="#c49b35" opacity="0.5"/>

  <!-- Contactless symbol -->
  <g transform="translate(98,108)" opacity="0.6">
    <path d="M0,11 Q5,5 0,-1" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M5,13 Q13,5 5,-3" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M10,15 Q21,5 10,-5" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Logo -->
  <text x="36" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">tria</text>
  <circle cx="31" cy="48" r="4" fill="#3b82f6"/>

  <!-- Card number -->
  <text x="36" y="190" font-family="'Courier New',monospace" font-size="16" fill="rgba(255,255,255,0.55)" letter-spacing="3.5">•••• •••• •••• ••••</text>

  <!-- Name / label -->
  <text x="36" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.38)" letter-spacing="2.5">SELF-CUSTODIAL</text>

  <!-- VISA -->
  <text x="352" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" font-style="italic" fill="white" opacity="0.85">VISA</text>
</svg>
