<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 265" width="420" height="265">
  <defs>
    <linearGradient id="kast-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#d8e3ef"/>
    </linearGradient>
    <linearGradient id="kast-pattern" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0bec5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#90a4ae" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="kast-shine" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="kast-blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="kast-clip">
      <rect width="420" height="265" rx="18"/>
    </clipPath>
  </defs>

  <!-- Base silver/white -->
  <rect width="420" height="265" rx="18" fill="url(#kast-bg)"/>

  <g clip-path="url(#kast-clip)">
    <!-- Subtle silver glow -->
    <ellipse cx="350" cy="50" rx="160" ry="120" fill="#cdd8e3" opacity="0.5" filter="url(#kast-blur)"/>

    <!-- Embossed KAST letterform pattern (right half) -->
    <!-- K shapes repeated as subtle texture -->
    <g opacity="0.12" stroke="#4a6070" stroke-width="1" fill="none">
      <polyline points="240,20 240,80 270,50 300,80 300,20"/>
      <polyline points="310,20 310,80 340,50 370,80 370,20"/>
      <polyline points="240,90 240,150 270,120 300,150 300,90"/>
      <polyline points="310,90 310,150 340,120 370,150 370,90"/>
      <polyline points="240,160 240,220 270,190 300,220 300,160"/>
      <polyline points="310,160 310,220 340,190 370,220 370,160"/>
      <polyline points="380,20 380,80 410,50 440,80 440,20"/>
      <polyline points="380,90 380,150 410,120 440,150 440,90"/>
      <polyline points="380,160 380,220 410,190 440,220 440,160"/>
      <!-- diagonals -->
      <line x1="240" y1="20" x2="440" y2="220" stroke-width="0.5"/>
      <line x1="240" y1="80" x2="440" y2="265" stroke-width="0.5"/>
      <line x1="290" y1="20" x2="440" y2="165" stroke-width="0.5"/>
    </g>

    <!-- Left gradient fade from white -->
    <rect width="220" height="265" fill="url(#kast-shine)" rx="18"/>
  </g>

  <!-- Chip (darker for contrast on light bg) -->
  <rect x="36" y="100" width="50" height="38" rx="5" fill="#c8a830"/>
  <rect x="36" y="100" width="50" height="38" rx="5" fill="none" stroke="#a88520" stroke-width="0.8"/>
  <line x1="36" y1="113" x2="86" y2="113" stroke="#a88520" stroke-width="0.7"/>
  <line x1="36" y1="125" x2="86" y2="125" stroke="#a88520" stroke-width="0.7"/>
  <line x1="55" y1="100" x2="55" y2="138" stroke="#a88520" stroke-width="0.7"/>
  <rect x="43" y="106" width="16" height="10" rx="2" fill="#b8991e" opacity="0.5"/>

  <!-- Contactless -->
  <g transform="translate(98,108)" opacity="0.5">
    <path d="M0,11 Q5,5 0,-1" fill="none" stroke="#2d3748" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M5,13 Q13,5 5,-3" fill="none" stroke="#2d3748" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M10,15 Q21,5 10,-5" fill="none" stroke="#2d3748" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- KAST logo -->
  <text x="36" y="63" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="#1a2634" letter-spacing="-1">K KAST</text>

  <!-- Card number -->
  <text x="36" y="190" font-family="'Courier New',monospace" font-size="16" fill="rgba(30,40,55,0.45)" letter-spacing="3.5">•••• •••• •••• ••••</text>

  <!-- Label -->
  <text x="36" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(30,40,55,0.38)" letter-spacing="2.5">STABLECOIN CARD</text>

  <!-- VISA -->
  <text x="348" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" font-style="italic" fill="#1a2634" opacity="0.75">VISA</text>
</svg>
